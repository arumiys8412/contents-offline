  <script type="text/babel">
    const { useState, useEffect } = React;

    // ═══════════════════════════════════════════════════════════════
    //  출석 상태 색상 (출석 체크 건 단위)
    // ═══════════════════════════════════════════════════════════════
    const ST = {
      PRESENT: { label: "출석", color: "#16a34a", bg: "#f0fdf4", bd: "#bbf7d0", dot: "#22c55e" },
      LATE: { label: "지각", color: "#ca8a04", bg: "#fefce8", bd: "#fde68a", dot: "#eab308" },
      EARLY_LEAVE: { label: "조퇴", color: "#ca8a04", bg: "#fefce8", bd: "#fde68a", dot: "#eab308" },
      ABSENT: { label: "결석", color: "#dc2626", bg: "#fef2f2", bd: "#fecaca", dot: "#ef4444" },
      PENDING: { label: "미처리", color: "#9ca3af", bg: "#f9fafb", bd: "#e5e7eb", dot: "#d1d5db" },
    };

    // ═══════════════════════════════════════════════════════════════
    //  일정 상태 색상 (교육일정 단위 — 대기/진행중/종료)
    // ═══════════════════════════════════════════════════════════════
    const IST = {
      WAITING: { label: "예정", dot: "#94a3b8", text: "#64748b", bg: "#f1f5f9", bd: "#cbd5e1" },
      ONGOING: { label: "진행", dot: "#2563eb", text: "#2563eb", bg: "#eff6ff", bd: "#bfdbfe" },
      ENDED:   { label: "종료", dot: "#9ca3af", text: "#6b7280", bg: "#f3f4f6", bd: "#e5e7eb" },
    };

    // 가상 현재 시각 (데모용): 2024-04-03 14:30 — 2일차 오후 실습(13~16시) 진행 중
    const NOW = new Date("2024-04-03T14:30:00");

    // 일정 상태 판정 (교육일정 단위)
    function getScheduleStatus(schedule, sessionDateObj) {
      const { start, end } = parseScheduleTime(schedule.time);
      // sessionDateObj 예: "2024-04-01"
      const [y, m, d] = sessionDateObj.split("-").map(Number);
      const startDt = new Date(y, m - 1, d, Math.floor(start), (start % 1) * 60);
      const endDt = new Date(y, m - 1, d, Math.floor(end), (end % 1) * 60);
      if (NOW < startDt) return "WAITING";
      if (NOW >= endDt) return "ENDED";
      return "ONGOING";
    }

    // 일차(세션) 대표 상태 판정 — 진행중 > 대기 > 종료 우선순위
    function getSessionStatus(session) {
      const states = session.schedules.map(sc => getScheduleStatus(sc, session.dateObj));
      if (states.includes("ONGOING")) return "ONGOING";
      if (states.includes("WAITING")) return "WAITING";
      return "ENDED";
    }

    // schedule.time 파싱 (parseTimeRange와 동일, 이름만 다르게)
    function parseScheduleTime(timeStr) {
      const re = /(오전|오후)\s*(\d+)시\s*~\s*(오전|오후)\s*(\d+)시/;
      const m = timeStr.match(re);
      if (!m) return { start: 9, end: 10 };
      const toH = (period, h) => {
        h = parseInt(h);
        if (period === "오후" && h !== 12) h += 12;
        if (period === "오전" && h === 12) h = 0;
        return h;
      };
      return { start: toH(m[1], m[2]), end: toH(m[3], m[4]) };
    }

    function TIcon({ type }) {
      const p = {
        video: <polygon points="5,3 19,12 5,21" fill="#fff"/>,

        article: <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="#fff" strokeWidth="2"/><line x1="8" y1="13" x2="16" y2="13" stroke="#fff" strokeWidth="2"/></>,

        offline: <><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" fill="none" stroke="#fff" strokeWidth="2"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" fill="none" stroke="#fff" strokeWidth="2"/></>,

      return (
        <div style={{ width: 26, height: 26, borderRadius: 7, backgroundColor: "#4b5563", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <svg width="14" height="14" viewBox="0 0 24 24">{p[type] || p.video}</svg>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    //  데이터 (v14 원본)

        ]},
        { id: "g2", group: "산재발생 시 산업재해보험 신청 절차", items: [

          { id: "i7", type: "offline", title: "오프라인 집체 교육 제1차", info: "오프라인", st: "progress" },
        ]},
      ],
      sessions: [
        { id: 1, name: "1일차", date: "4월 1일 월요일", dateObj: "2024-04-01", schedules: [
          { id: 101, title: "영업 환경 변화에 따른 혁신 사례 연구", time: "오전 9시 ~ 오전 12시", dur: "3시간", fd: "2024년 4월 1일 월요일", inst: "나강사", inst2: null, tags: ["#리더십", "#태그"], loc: "휴넷캠퍼스 혁신관", desc: "리더십 프로그램입니다.", grp: { name: "1조 LABS플랫폼팀", cnt: 12 }, ho: ["데이터 분석 방법론1.doc", "데이터 분석 방법론.doc", "빅데이터 기반의 이론과 실제의 연구.pdf"], hs: "12.8MB", att: [
            { round: 1, name: "입실 체크", time: "09:00", status: "PRESENT" },
            { round: 2, name: "중간 체크", time: "10:30", status: "PRESENT" },
            { round: 3, name: "퇴실 체크", time: "12:00", status: "LATE", comment: "관리자 확인 출석 인정" },
          ]},
          { id: 102, title: "영업 환경의 급격한 변화와 기술 발전에 따른 기업의 혁신", time: "오후 1시 ~ 오후 3시", dur: "2시간", fd: "2024년 4월 1일 월요일", inst: "박신론", inst2: "나강사", tags: [], loc: null, desc: null, grp: null, ho: [], hs: null, att: [
            { round: 1, name: "입실 체크", time: "13:00", status: "PRESENT" },
            { round: 2, name: "퇴실 체크", time: "15:00", status: "PRESENT" },
          ]},
        ]},
        { id: 2, name: "2일차", date: "4월 3일 수요일", dateObj: "2024-04-03", schedules: [
          { id: 201, title: "리더십 스타일의 유형 및 효과적인 리더십 발휘 방안", time: "오전 9시 ~ 오전 12시", dur: "3시간", fd: "2024년 4월 3일 수요일", inst: "박신론", inst2: "나강사", tags: [], loc: null, desc: null, grp: null, ho: ["리더십 워크북.pdf", "사례집.pdf"], hs: "8.5MB", att: [
            { round: 1, name: "입실", time: "09:00", status: "LATE", comment: "교통 지연으로 10분 지각, 출석 인정 처리" },
            { round: 2, name: "퇴실", time: "12:00", status: "PRESENT" },
          ]},
          { id: 202, title: "리더십 역량 강화를 위한 실습 및 토론", time: "오후 1시 ~ 오후 4시", dur: "3시간", fd: "2024년 4월 3일 수요일", inst: "박신론", inst2: null, tags: [], loc: null, desc: null, grp: null, ho: [], hs: null, att: [
            { round: 1, name: "출석 체크", time: "13:00", status: "PENDING" },
          ]},
        ]},
        { id: 3, name: "3일차", date: "4월 5일 금요일", dateObj: "2024-04-05", schedules: [
          { id: 301, title: "실전 프로젝트 워크샵 — 데이터 분석과 시각화", time: "오후 1시 ~ 오후 3시", dur: "2시간", fd: "2024년 4월 5일 금요일", inst: "김강사", inst2: null, tags: ["#프로젝트"], loc: "세미나실 B", desc: null, grp: null, ho: ["워크샵 가이드.pdf"], hs: "3.2MB", att: [
            { round: 1, name: "입실", time: "13:00", status: "PENDING" },
            { round: 2, name: "퇴실", time: "15:00", status: "PENDING" },
          ]},
          { id: 302, title: "팀 프로젝트 발표 및 피드백 세션", time: "오후 3시 ~ 오후 5시", dur: "2시간", fd: "2024년 4월 5일 금요일", inst: "박신론", inst2: null, tags: [], loc: null, desc: null, grp: null, ho: [], hs: null, att: [
            { round: 1, name: "입실", time: "15:00", status: "PENDING" },
            { round: 2, name: "퇴실", time: "17:00", status: "PENDING" },
          ]},
        ]},
      ],
    };

    function getStats() {
      const all = D.sessions.flatMap(s => s.schedules.flatMap(sc => sc.att));
      const t = all.length;
      const c = { PRESENT: 0, LATE: 0, EARLY_LEAVE: 0, ABSENT: 0, PENDING: 0 };
      all.forEach(a => { c[a.status] = (c[a.status] || 0) + 1; });
      return { all, total: t, cnts: c, passed: c.PRESENT };
    }

    // 시간 파싱 공통 함수
    function parseTimeRange(timeStr) {
      const re = /(오전|오후)\s*(\d+)시\s*~\s*(오전|오후)\s*(\d+)시/;
      const m = timeStr.match(re);
      if (!m) return { start: 9, end: 10 };
      const toH = (period, h) => {
        h = parseInt(h);
        if (period === "오후" && h !== 12) h += 12;
        if (period === "오전" && h === 12) h = 0;
        return h;
      };
      return { start: toH(m[1], m[2]), end: toH(m[3], m[4]) };
    }

    // 세션의 전체 시간 범위 (최소 시작 ~ 최대 종료)
    function getSessionTimeRange(session) {
      const ranges = session.schedules.map(sc => parseTimeRange(sc.time));
      const minStart = Math.min(...ranges.map(r => r.start));
      const maxEnd = Math.max(...ranges.map(r => r.end));
      return { start: minStart, end: maxEnd };
    }

    // ═══════════════════════════════════════════════════════════════
    //  A: 출석 현황 — 막대바 분절 + 숫자 박스
    // ═══════════════════════════════════════════════════════════════
    function AttendanceSummary() {
      const { total, cnts, passed } = getStats();
      const pct = total > 0 ? Math.round((passed / total) * 100) : 0;
      return (
        <div style={{ padding: "14px 16px", backgroundColor: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#111" }}>출석 현황</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#111" }}>
              {passed}<span style={{ color: "#9ca3af", fontWeight: 400 }}>/{total}회</span>
            </span>
          </div>
          {/* 막대바 분절 — 전체 출석 체크 건수를 균등 N분할 기준으로 100% 구성 (건당 동일 비중) */}
          <div style={{ display: "flex", height: 12, borderRadius: 6, overflow: "hidden", backgroundColor: "#f3f4f6" }}>
            {["PRESENT", "LATE", "EARLY_LEAVE", "ABSENT", "PENDING"].map(k => {
              const w = total > 0 ? ((cnts[k] || 0) / total) * 100 : 0;
              return w > 0 ? <div key={k} style={{ width: `${w}%`, backgroundColor: ST[k].dot, transition: "width .3s" }} /> : null;
            })}
          </div>
          {/* 출결 데이터 표시 (2열 2줄) */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, marginTop: 8 }}>
            {[["PRESENT", "출석"], ["LATE", "지각/조퇴"], ["ABSENT", "결석"], ["PENDING", "미처리"]].map(([k, lb]) => (
              <div key={k} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 10px", borderRadius: 6, backgroundColor: ST[k].bg, border: `1px solid ${ST[k].bd}` }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: ST[k].dot, flexShrink: 0 }} />
                <span style={{ fontSize: 11, color: ST[k].color, fontWeight: 600 }}>{lb}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: ST[k].color, marginLeft: "auto" }}>
                  {k === "LATE" ? (cnts.LATE || 0) + (cnts.EARLY_LEAVE || 0) : cnts[k] || 0}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    //  좌측 콘텐츠 정보 패널
    // ═══════════════════════════════════════════════════════════════
    function InfoPanel({ onClose, showClose }) {
      return (

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "16px 18px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, backgroundColor: "#4b5563", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2">
                  <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
                  <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
                </svg>
              </div>
              <span style={{ fontSize: 13, fontWeight: 600, color: "#6b7280" }}>오프라인</span>
            </div>
            {showClose && <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#9ca3af", fontSize: 20, padding: 0 }}>✕</button>}
          </div>
          <div style={{ padding: "12px 18px 0" }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 4 }}>
              <span style={{ color: "#ef4444", fontSize: 14, fontWeight: 700 }}>*</span>

            </div>

          {D.tags.length > 0 && (
            <div style={{ padding: "8px 18px 0", display: "flex", gap: 4, flexWrap: "wrap" }}>
              {D.tags.map((t, i) => <span key={i} style={{ fontSize: 10, color: "#6b7280", backgroundColor: "#f3f4f6", borderRadius: 4, padding: "2px 6px" }}>{t}</span>)}

            <div style={{ fontSize: 13, fontWeight: 700, color: "#111", marginBottom: 6 }}>완료기준</div>
            <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>
              {D.pass}
            </div>
          </div>
        </div>

    }

    // ═══════════════════════════════════════════════════════════════
    //  B: 교육일정 상세 — 1회/2회/3회 표시
    // ═══════════════════════════════════════════════════════════════
    function DetailPanel({ sc, onClose }) {
      if (!sc) return null;
      // 이 schedule의 소속 session을 찾아 상태 판정
      const session = D.sessions.find(s => s.schedules.some(x => x.id === sc.id));
      const scheduleStatus = session ? getScheduleStatus(sc, session.dateObj) : "ENDED";
      const [showAttendGuide, setShowAttendGuide] = useState(false);
      return (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "#fff", zIndex: 20, overflowY: "auto", animation: "su .25s ease" }}>
          <style>{`@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
          <div style={{ position: "sticky", top: 0, backgroundColor: "#fff", zIndex: 1, padding: "14px 18px 10px", borderBottom: "1px solid #f3f4f6" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <h3 style={{ fontSize: 16, fontWeight: 800, color: "#111", margin: 0, lineHeight: 1.4, flex: 1, paddingRight: 12 }}>{sc.title}</h3>
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "#9ca3af", fontSize: 18 }}>✕</button>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6, fontSize: 12, color: "#6b7280" }}>
              <span>{sc.inst}{sc.inst2 ? `, ${sc.inst2}` : ""}</span>
              <span style={{ color: "#e5e7eb" }}>|</span>
              <span>{sc.time}</span>
              <span style={{ color: "#e5e7eb" }}>|</span>
              <span>{sc.dur}</span>
            </div>
            <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 3 }}>{sc.fd}</div>
            {sc.tags.length > 0 && (
              <div style={{ display: "flex", gap: 4, marginTop: 6 }}>
                {sc.tags.map((t, i) => <span key={i} style={{ fontSize: 10, color: "#6b7280", backgroundColor: "#f3f4f6", borderRadius: 4, padding: "2px 6px" }}>{t}</span>)}
              </div>
            )}
          </div>
          <div style={{ padding: "14px 18px" }}>
            {sc.loc && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 3 }}>장소</div>
                <p style={{ fontSize: 13, color: "#6b7280", margin: 0 }}>{sc.loc}</p>
              </div>
            )}
            {sc.ho.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 6 }}>교안 {sc.ho.length}</div>
                <button style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 12px", borderRadius: 8, border: "1px solid #2563eb", backgroundColor: "#eff6ff", color: "#2563eb", fontWeight: 600, fontSize: 12, cursor: "pointer", marginBottom: 6 }}>
                  모두받기 {sc.hs}
                </button>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
                  {sc.ho.map((h, i) => (
                    <div key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "7px 10px", borderRadius: 8, border: "1px solid #f3f4f6", fontSize: 11, color: "#374151" }}>
                      ⬇ {h}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {sc.desc && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 3 }}>설명</div>
                <p style={{ fontSize: 13, color: "#6b7280", lineHeight: 1.6, margin: 0 }}>{sc.desc}</p>
              </div>
            )}

            {/* 출석 체크 — 1회/2회/3회 (전 상태 공통 노출) */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 8 }}>
                출석 체크 <span style={{ fontWeight: 400, color: "#9ca3af" }}>{sc.att.length}회</span>
              </div>
              {sc.att.length === 0 ? (
                <div style={{ padding: "14px 12px", borderRadius: 8, backgroundColor: "#f9fafb", border: "1px dashed #e5e7eb", textAlign: "center", fontSize: 12, color: "#9ca3af" }}>
                  등록된 출석 체크가 없습니다
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {sc.att.map((a, i) => {
                    const s = ST[a.status] || ST.PENDING;
                    // 예정 상태 교육일정은 출석 결과가 아직 확정되지 않았으므로 출석 관련 정보 미노출
                    const isWaiting = scheduleStatus === "WAITING";
                    // 출석 인정: comment에 "출석 인정" 키워드가 있을 때 원본 상태가 지각/조퇴/결석인 경우 배지 노출
                    const isAdjusted = !isWaiting && a.comment && a.comment.includes("출석 인정") && ["LATE", "EARLY_LEAVE", "ABSENT"].includes(a.status);
                    // 수동 출석체크 방식일 때 각 회차에 안내 버튼 노출
                    const showManualGuide = D.attendMode === "MANUAL";
                    return (
                      <div key={i} style={{
                        display: "flex",
                        alignItems: "flex-start",
                        justifyContent: "space-between",
                        padding: "10px 12px",
                        borderRadius: 8,
                        backgroundColor: a.comment && !isWaiting ? "#fffbf5" : "#f9fafb",
                        border: a.comment && !isWaiting ? "1px solid #fed7aa" : "1px solid #f3f4f6",
                      }}>
                        <div style={{ display: "flex", alignItems: "flex-start", gap: 8, flex: 1, minWidth: 0 }}>
                          <span style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: isWaiting ? "#e5e7eb" : s.dot, flexShrink: 0, marginTop: 5 }} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div>
                              <span style={{ fontSize: 12, fontWeight: 700, color: "#374151" }}>{a.round}회</span>
                              <span style={{ fontSize: 11, color: "#9ca3af", marginLeft: 6 }}>{a.name}</span>
                              {a.time && !isWaiting && <span style={{ fontSize: 11, color: "#d1d5db", marginLeft: 6 }}>{a.time}</span>}
                            </div>
                            {a.comment && !isWaiting && (
                              <div style={{ fontSize: 11, color: "#92400e", marginTop: 4, lineHeight: 1.4 }}>
                                💬 {a.comment}
                              </div>
                            )}
                          </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0, marginLeft: 8 }}>
                          {isAdjusted && (
                            <span style={{ fontSize: 10, fontWeight: 600, color: "#16a34a", backgroundColor: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 4, padding: "2px 6px" }}>출석 인정</span>
                          )}
                          {!isWaiting && (
                            <span style={{ fontSize: 10, fontWeight: 600, color: s.color, backgroundColor: s.bg, border: `1px solid ${s.bd}`, borderRadius: 4, padding: "2px 6px" }}>{s.label}</span>
                          )}
                          {showManualGuide && (
                            <button onClick={(e) => { e.stopPropagation(); setShowAttendGuide(true); }} style={{
                              width: 20,
                              height: 20,
                              borderRadius: "50%",
                              border: "1px solid #e5e7eb",
                              backgroundColor: "#fff",
                              color: "#6b7280",
                              fontSize: 11,
                              fontWeight: 700,
                              cursor: "pointer",
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "center",
                              padding: 0,
                              flexShrink: 0,
                            }} title="출석 안내">ⓘ</button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* 출석 안내 팝업 — 최종 정책 문구 반영 */}
            {showAttendGuide && (
              <div onClick={() => setShowAttendGuide(false)} style={{
                position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                backgroundColor: "rgba(0,0,0,0.4)", zIndex: 30,
                display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
              }}>
                <div onClick={(e) => e.stopPropagation()} style={{
                  backgroundColor: "#fff", borderRadius: 12, padding: "20px 22px",
                  maxWidth: 340, width: "100%", boxShadow: "0 10px 25px rgba(0,0,0,0.15)",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                    <span style={{ fontSize: 16 }}>ⓘ</span>
                    <h4 style={{ fontSize: 14, fontWeight: 700, color: "#111", margin: 0 }}>출석 안내</h4>
                  </div>
                  <p style={{ fontSize: 12, color: "#374151", lineHeight: 1.7, margin: "0 0 8px" }}>
                    이 교육은 <strong>QR 출석 없이 운영자가 출석 정보를 직접 등록</strong>할 예정입니다.
                  </p>
                  <p style={{ fontSize: 12, color: "#374151", lineHeight: 1.7, margin: "0 0 14px" }}>
                    학습 기간과 관계없이 <strong>출석이 등록되는 시점에 수료 처리</strong>됩니다.
                  </p>
                  <button onClick={() => setShowAttendGuide(false)} style={{
                    width: "100%", padding: "10px", borderRadius: 8, border: "none",
                    backgroundColor: "#2563eb", color: "#fff", fontWeight: 600, fontSize: 12, cursor: "pointer",
                  }}>확인</button>
                </div>
              </div>
            )}

            {sc.grp && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 6 }}>조별 활동</div>
                <div style={{ padding: "10px 12px", borderRadius: 10, backgroundColor: "#f9fafb", border: "1px solid #f3f4f6" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#111", marginBottom: 6 }}>{sc.grp.name} · {sc.grp.cnt}명</div>
                  <div style={{ display: "flex", flexWrap: "wrap" }}>
                    {[...Array(Math.min(sc.grp.cnt, 10))].map((_, i) => {
                      const cs = ["#06b6d4", "#8b5cf6", "#ec4899", "#f59e0b", "#10b981", "#3b82f6", "#ef4444", "#6366f1", "#14b8a6", "#f97316"];
                      return (
                        <div key={i} style={{ width: 30, height: 30, borderRadius: "50%", backgroundColor: cs[i % cs.length], border: "2px solid #fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 600, marginLeft: i > 0 ? -6 : 0 }}>
                          {String.fromCharCode(65 + i)}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    //  카드형 (v14 원본)
    // ═══════════════════════════════════════════════════════════════
    function CardView({ onSelect, selId }) {
      const [og, setOg] = useState({ 1: true, 2: true, 3: true });
      return D.sessions.map(session => (
        <div key={session.id} style={{ marginBottom: 16 }}>
          <div onClick={() => setOg(p => ({ ...p, [session.id]: !p[session.id] }))} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "2px solid #111", marginBottom: 8, cursor: "pointer" }}>
            <span style={{ fontSize: 14, fontWeight: 800, color: "#111" }}>{session.name} · {session.date}</span>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 11, color: "#9ca3af" }}>{session.schedules.length}개 수업</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" style={{ transform: og[session.id] ? "rotate(180deg)" : "rotate(0)", transition: "transform .2s" }}>
                <polyline points="6,9 12,15 18,9"/>
              </svg>
            </div>
          </div>
          {og[session.id] && session.schedules.map(sc => {
            const status = getScheduleStatus(sc, session.dateObj);
            const ist = IST[status];
            const isOngoing = status === "ONGOING";
            return (
            <div key={sc.id} onClick={() => onSelect(sc)} style={{
              padding: "12px 14px",
              borderRadius: 10,
              marginBottom: 6,
              cursor: "pointer",
              border: selId === sc.id ? "2px solid #2563eb" : "1px solid #e5e7eb",
              backgroundColor: (selId === sc.id || isOngoing) ? "#f8faff" : "#f9fafb",
            }}>
              <p style={{ fontSize: 13, fontWeight: 500, color: "#111", margin: 0, lineHeight: 1.5, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{sc.title}</p>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 5, fontSize: 12, color: "#6b7280", flexWrap: "wrap" }}>
                <span style={{
                  fontSize: 10,
                  fontWeight: 700,
                  color: ist.text,
                  backgroundColor: ist.bg,
                  border: `1px solid ${ist.bd}`,
                  borderRadius: 3,
                  padding: "1px 6px",
                  lineHeight: "16px",
                }}>{ist.label}</span>
                <span>{sc.time}</span>
                <span style={{ color: "#d1d5db" }}>·</span>
                <span>{sc.inst}{sc.inst2 ? `, ${sc.inst2}` : ""}</span>
                <span style={{ color: "#d1d5db" }}>·</span>
                <span>출석 체크 {sc.att.length}회</span>
              </div>
            </div>
            );
          })}
        </div>
      ));
    }

    // ═══════════════════════════════════════════════════════════════
    //  월별 보기 (일차만 표시, 콘텐츠명 미노출)
    // ═══════════════════════════════════════════════════════════════
    function MonthView({ onSelect }) {
      // 2024년 4월 기준
      const [year, month] = [2024, 4];
      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      const daysInMonth = lastDay.getDate();
      const startDayOfWeek = firstDay.getDay();
      const weekDays = ["일", "월", "화", "수", "목", "금", "토"];

      // 일정을 날짜별로 그룹 (day → session 정보)
      const sessionByDay = {};
      D.sessions.forEach(session => {
        const day = parseInt(session.dateObj.split("-")[2]);
        sessionByDay[day] = session;
      });

      const scheduledDays = Object.keys(sessionByDay).map(Number).sort((a, b) => a - b);
      const minDay = scheduledDays[0];
      const maxDay = scheduledDays[scheduledDays.length - 1];

      // 일차의 대표 상태 판정은 getSessionStatus 공통 함수 사용 (IST 기반)

      const cells = [];
      for (let i = 0; i < startDayOfWeek; i++) cells.push({ empty: true });
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month - 1, d);
        const inPeriod = d >= minDay && d <= maxDay;
        cells.push({
          day: d,
          dayOfWeek: date.getDay(),
          inPeriod,
          session: sessionByDay[d] || null,
        });
      }

      return (
        <div style={{ backgroundColor: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden" }}>
          {/* 헤더 */}
          <div style={{ padding: "12px 16px", borderBottom: "1px solid #f3f4f6", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <button style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "#6b7280" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg>
              </button>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#111" }}>{year}년 {month}월</div>
              <button style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "#6b7280" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
              </button>
            </div>
            <div style={{ fontSize: 11, color: "#9ca3af" }}>교육일정: {scheduledDays.map(d => `4/${d}`).join(", ")} ({scheduledDays.length}일)</div>
          </div>

          {/* 요일 헤더 */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", borderBottom: "1px solid #f3f4f6" }}>
            {weekDays.map((d, i) => (
              <div key={d} style={{ fontSize: 11, fontWeight: 500, padding: "8px 0", textAlign: "center", color: i === 0 ? "#ef4444" : i === 6 ? "#3b82f6" : "#6b7280" }}>{d}</div>
            ))}
          </div>

          {/* 날짜 그리드 */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)" }}>
            {cells.map((cell, i) => (
              <div key={i} style={{ minHeight: 72, borderRight: (i + 1) % 7 === 0 ? "none" : "1px solid #f3f4f6", borderBottom: "1px solid #f3f4f6", padding: 6, backgroundColor: "#fff" }}>
                {!cell.empty && (
                  <>
                    <div style={{ fontSize: 11, fontWeight: 600, color: "#374151", marginBottom: 4 }}>
                      {cell.day}
                    </div>
                    {cell.session && (() => {
                      const status = getSessionStatus(cell.session);
                      const range = getSessionTimeRange(cell.session);
                      const ist = IST[status];
                      return (
                        <div onClick={() => cell.session.schedules[0] && onSelect(cell.session.schedules[0])} style={{
                          padding: "4px 6px",
                          borderRadius: 4,
                          backgroundColor: status === "ONGOING" ? "#f8faff" : "#f9fafb",
                          border: "1px solid #e5e7eb",
                          cursor: "pointer",
                          lineHeight: 1.3,
                        }}>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#374151" }}>{cell.session.name}</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 3, marginTop: 2 }}>
                            <span style={{
                              fontSize: 9,
                              fontWeight: 700,
                              color: ist.text,
                              backgroundColor: ist.bg,
                              border: `1px solid ${ist.bd}`,
                              borderRadius: 3,
                              padding: "0 4px",
                              lineHeight: "13px",
                              flexShrink: 0,
                            }}>{ist.label}</span>
                            <span style={{ fontSize: 9, fontWeight: 500, color: "#6b7280" }}>
                              {range.start}~{range.end}시
                            </span>
                          </div>
                        </div>
                      );
                    })()}
                  </>
                )}
              </div>
            ))}
          </div>

          {/* 범례 (일정 상태 라벨) */}
          <div style={{ padding: "10px 16px", borderTop: "1px solid #f3f4f6", backgroundColor: "#fafafa", display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: "#6b7280", flexWrap: "wrap" }}>
            {Object.keys(IST).map(k => {
              const ist = IST[k];
              return (
                <span key={k} style={{
                  fontSize: 9,
                  fontWeight: 700,
                  color: ist.text,
                  backgroundColor: ist.bg,
                  border: `1px solid ${ist.bd}`,
                  borderRadius: 3,
                  padding: "0 5px",
                  lineHeight: "16px",
                }}>{ist.label}</span>
              );
            })}
            <span style={{ marginLeft: "auto", fontSize: 9, color: "#9ca3af" }}>※ 출석 상태는 일정 상세에서 확인</span>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    //  주별 보기 (4월 1주차, 7일 모두 표시)
    // ═══════════════════════════════════════════════════════════════
    function WeekView({ onSelect }) {
      // 2024년 4월 1주차: 3/31(일) ~ 4/6(토) - 일요일 시작
      // 교육일정이 있는 4/1(월), 4/2(화), 4/3(수) 포함
      const weekDates = [
        { day: 31, month: 3, weekday: "일", dateKey: "2024-03-31" },
        { day: 1, month: 4, weekday: "월", dateKey: "2024-04-01" },
        { day: 2, month: 4, weekday: "화", dateKey: "2024-04-02" },
        { day: 3, month: 4, weekday: "수", dateKey: "2024-04-03" },
        { day: 4, month: 4, weekday: "목", dateKey: "2024-04-04" },
        { day: 5, month: 4, weekday: "금", dateKey: "2024-04-05" },
        { day: 6, month: 4, weekday: "토", dateKey: "2024-04-06" },
      ];
      const hours = [9, 10, 11, 12, 13, 14, 15, 16, 17];

      // 날짜별 session 매핑
      const sessionByDate = {};
      D.sessions.forEach(session => {
        sessionByDate[session.dateObj] = session;
      });

      // 일정 상태는 getScheduleStatus 공통 함수 사용 (IST 기반)

      return (
        <div style={{ backgroundColor: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden" }}>
          {/* 헤더 */}
          <div style={{ padding: "12px 16px", borderBottom: "1px solid #f3f4f6", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <button style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "#6b7280" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg>
              </button>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#111" }}>2024년 4월 1주차</div>
              <button style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "#6b7280" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
              </button>
            </div>
            <div style={{ fontSize: 11, color: "#9ca3af" }}>3/31 ~ 4/6</div>
          </div>

          {/* 요일 헤더 (7일) */}
          <div style={{ display: "grid", gridTemplateColumns: "40px repeat(7, 1fr)", borderBottom: "1px solid #f3f4f6" }}>
            <div />
            {weekDates.map((d, i) => (
              <div key={i} style={{ padding: "8px 2px", textAlign: "center", borderLeft: "1px solid #f3f4f6" }}>
                <div style={{ fontSize: 10, color: d.weekday === "일" ? "#ef4444" : d.weekday === "토" ? "#3b82f6" : "#9ca3af" }}>
                  {d.weekday}
                </div>
                <div style={{ fontSize: 12, fontWeight: 700, color: d.weekday === "일" ? "#ef4444" : d.weekday === "토" ? "#3b82f6" : "#111", marginTop: 2 }}>
                  {d.month}/{d.day}
                </div>
              </div>
            ))}
          </div>

          {/* 시간 그리드 */}
          <div style={{ position: "relative", overflowX: "auto" }}>
            <div style={{ minWidth: 560 }}>
              {hours.map(h => (
                <div key={h} style={{ display: "grid", gridTemplateColumns: "40px repeat(7, 1fr)", height: 52 }}>
                  <div style={{ fontSize: 10, color: "#9ca3af", textAlign: "right", paddingTop: 2, paddingRight: 4, borderBottom: "1px solid #f9fafb" }}>{h}시</div>
                  {weekDates.map((d, i) => (
                    <div key={i} style={{ borderLeft: "1px solid #f9fafb", borderBottom: "1px solid #f9fafb" }} />
                  ))}
                </div>
              ))}
              {/* 일정 블록 (absolute positioning over grid) */}
              {weekDates.map((d, dayIdx) => {
                const session = sessionByDate[d.dateKey];
                if (!session) return null;
                const schedules = session.schedules;
                return schedules.map(sc => {
                  const { start, end } = parseTimeRange(sc.time);
                  const hourIndex = start - 9;
                  if (hourIndex < 0 || hourIndex > 8) return null;
                  const top = hourIndex * 52 + 2;
                  const height = (end - start) * 52 - 4;
                  const status = getScheduleStatus(sc, session.dateObj);
                  const ist = IST[status];

                  return (
                    <button key={sc.id} onClick={() => onSelect(sc)} title={`${sc.title}\n${sc.time}\n${sc.inst}${sc.inst2 ? ", " + sc.inst2 : ""}\n상태: ${ist.label}`} style={{
                      position: "absolute",
                      top: top,
                      left: `calc(40px + ${dayIdx} * ((100% - 40px) / 7) + 2px)`,
                      width: `calc((100% - 40px) / 7 - 4px)`,
                      height: height,
                      padding: "3px 5px",
                      borderRadius: 4,
                      border: "1px solid #e5e7eb",
                      backgroundColor: status === "ONGOING" ? "#f8faff" : "#f9fafb",
                      cursor: "pointer",
                      textAlign: "left",
                      overflow: "hidden",
                      zIndex: 1,
                    }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#374151", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", lineHeight: 1.3 }}>
                        {sc.title}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 3, marginTop: 1 }}>
                        <span style={{
                          fontSize: 8,
                          fontWeight: 700,
                          color: ist.text,
                          backgroundColor: ist.bg,
                          border: `1px solid ${ist.bd}`,
                          borderRadius: 2,
                          padding: "0 3px",
                          lineHeight: "12px",
                          flexShrink: 0,
                        }}>{ist.label}</span>
                        <span style={{ fontSize: 9, color: "#6b7280" }}>{start}~{end}시</span>
                      </div>
                    </button>
                  );
                });
              })}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    //  일별 보기 (탭 제거, 현재 날짜 + 좌우 화살표 네비게이션)
    // ═══════════════════════════════════════════════════════════════
    function DayView({ selDay, setSelDay, onSelect }) {
      const days = [
        { day: 1, label: "4월 1일 월요일", name: "1일차", session: D.sessions[0] },
        { day: 3, label: "4월 3일 수요일", name: "2일차", session: D.sessions[1] },
        { day: 5, label: "4월 5일 금요일", name: "3일차", session: D.sessions[2] },
      ];
      const currentIndex = days.findIndex(d => d.day === selDay);
      const selected = days[currentIndex] || days[0];
      const hours = [9, 10, 11, 12, 13, 14, 15, 16, 17];

      // 일정 상태는 getScheduleStatus 공통 함수 사용 (IST 기반)

      const goPrev = () => { if (currentIndex > 0) setSelDay(days[currentIndex - 1].day); };
      const goNext = () => { if (currentIndex < days.length - 1) setSelDay(days[currentIndex + 1].day); };
      const canPrev = currentIndex > 0;
      const canNext = currentIndex < days.length - 1;

      return (
        <div style={{ backgroundColor: "#fff", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden" }}>
          {/* 날짜 네비게이션 (탭 대신) */}
          <div style={{ padding: "14px 16px", borderBottom: "1px solid #f3f4f6", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <button
              onClick={goPrev}
              disabled={!canPrev}
              style={{
                background: "none",
                border: "none",
                cursor: canPrev ? "pointer" : "not-allowed",
                padding: 6,
                color: canPrev ? "#6b7280" : "#e5e7eb",
                display: "flex",
                alignItems: "center",
                gap: 4,
                fontSize: 12,
              }}
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="15,18 9,12 15,6"/>
              </svg>
              {canPrev && <span>{days[currentIndex - 1].name}</span>}
            </button>

            <div style={{ textAlign: "center", flex: 1 }}>
              <div style={{ fontSize: 17, fontWeight: 800, color: "#111" }}>{selected.label}</div>
              <div style={{ fontSize: 12, color: "#2563eb", fontWeight: 600, marginTop: 3 }}>{selected.name}</div>
            </div>

            <button
              onClick={goNext}
              disabled={!canNext}
              style={{
                background: "none",
                border: "none",
                cursor: canNext ? "pointer" : "not-allowed",
                padding: 6,
                color: canNext ? "#6b7280" : "#e5e7eb",
                display: "flex",
                alignItems: "center",
                gap: 4,
                fontSize: 12,
              }}
            >
              {canNext && <span>{days[currentIndex + 1].name}</span>}
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="9,18 15,12 9,6"/>
              </svg>
            </button>
          </div>

          {/* 타임라인 */}
          {selected && selected.session && (
            <div style={{ position: "relative", padding: "0 16px 16px" }}>
              {/* 시간 눈금 */}
              {hours.map(h => (
                <div key={h} style={{ display: "flex", alignItems: "flex-start", height: 64, borderBottom: "1px solid #f9fafb" }}>
                  <div style={{ width: 40, fontSize: 10, color: "#9ca3af", textAlign: "right", paddingTop: 2, paddingRight: 8, flexShrink: 0 }}>{h}시</div>
                  <div style={{ flex: 1, borderLeft: "1px solid #f3f4f6" }}/>
                </div>
              ))}

              {/* 일정 블록 (absolute) */}
              <div style={{ position: "absolute", top: 0, left: 64, right: 16, bottom: 16 }}>
                {selected.session.schedules.map(sc => {
                  const { start, end } = parseTimeRange(sc.time);
                  const hourIndex = start - 9;
                  const top = hourIndex * 64 + 4;
                  const height = (end - start) * 64 - 8;
                  const status = getScheduleStatus(sc, selected.session.dateObj);
                  const ist = IST[status];

                  return (
                    <button key={sc.id} onClick={() => onSelect(sc)} style={{
                      position: "absolute",
                      top: top,
                      left: 8,
                      right: 0,
                      height: height,
                      padding: "10px 12px",
                      borderRadius: 8,
                      border: "1px solid #e5e7eb",
                      backgroundColor: status === "ONGOING" ? "#f8faff" : "#f9fafb",
                      cursor: "pointer",
                      textAlign: "left",
                      overflow: "hidden",
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#111", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", marginBottom: 4 }}>
                        {sc.title}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{
                          fontSize: 10,
                          fontWeight: 700,
                          color: ist.text,
                          backgroundColor: ist.bg,
                          border: `1px solid ${ist.bd}`,
                          borderRadius: 3,
                          padding: "1px 6px",
                          flexShrink: 0,
                        }}>{ist.label}</span>
                        <span style={{ fontSize: 11, color: "#6b7280" }}>
                          {sc.time} · {sc.inst}{sc.inst2 ? `, ${sc.inst2}` : ""}
                        </span>
                      </div>
                      {height > 80 && sc.loc && (
                        <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 4 }}>
                          📍 {sc.loc}
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    //  공통
    // ═══════════════════════════════════════════════════════════════
    function SlideUp({ show, onClose, children }) {
      if (!show) return null;
      return (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 50, display: "flex", flexDirection: "column" }}>
          <div onClick={onClose} style={{ flex: "0 0 50px", backgroundColor: "rgba(0,0,0,.3)" }} />
          <div style={{ flex: 1, backgroundColor: "#fff", borderRadius: "16px 16px 0 0", overflowY: "auto", animation: "msu .3s ease", boxShadow: "0 -8px 30px rgba(0,0,0,.12)" }}>
            <style>{`@keyframes msu{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>
            <div style={{ width: 36, height: 4, borderRadius: 2, backgroundColor: "#d1d5db", margin: "8px auto" }} />
            {children}
          </div>
        </div>
      );
    }

    function ListPanel({ showClose, onClose }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
          <div style={{ padding: "12px 14px 8px", borderBottom: "1px solid #f3f4f6", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#111" }}>학습목록</span>
            {showClose ? (
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#9ca3af", fontSize: 18, padding: 0 }}>✕</button>
            ) : (
              <div style={{ display: "flex", gap: 10, fontSize: 10, color: "#9ca3af" }}>
                <label style={{ display: "flex", alignItems: "center", gap: 2, cursor: "pointer" }}>
                  <input type="checkbox" style={{ width: 12, height: 12 }} /> 완료 숨김
                </label>
                <label style={{ display: "flex", alignItems: "center", gap: 2, cursor: "pointer" }}>
                  <input type="checkbox" style={{ width: 12, height: 12 }} /> 필수만
                </label>
              </div>
            )}
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "6px 10px" }}>
            {D.list.map(g => (
              <div key={g.id} style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, color: "#9ca3af", padding: "3px 2px 5px", fontWeight: 500 }}>{g.group}</div>
                {g.items.map(item => {
                  const stC = item.st === "done" ? "#16a34a" : "#3b82f6";
                  return (
                    <div key={item.id} style={{ padding: "10px 12px", backgroundColor: "#fff", borderRadius: 10, marginBottom: 5, border: item.cur ? "2px solid #3b82f6" : "1px solid #f3f4f6" }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
                        <TIcon type={item.type} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 6 }}>
                            <p style={{ fontSize: 12, fontWeight: 500, color: "#111", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</p>
                            <span style={{ fontSize: 10, fontWeight: 600, color: stC, flexShrink: 0 }}>{item.st === "done" ? "완료" : "미완료"}</span>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
                            <span style={{ fontSize: 9, fontWeight: 700, color: "#f97316", backgroundColor: "#fff7ed", border: "1px solid #fed7aa", borderRadius: 3, padding: "0 3px", lineHeight: "14px" }}>필수</span>
                            <span style={{ fontSize: 10, color: "#9ca3af" }}>{item.info}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      );
    }

                  display: "flex",
                  alignItems: "center",

              >
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16,17 21,12 16,7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>

              </button>
            </div>
            <SlideUp show={showInfo} onClose={() => setShowInfo(false)}>
              <InfoPanel onClose={() => setShowInfo(false)} showClose />
            </SlideUp>
            <SlideUp show={showDetail} onClose={() => setShowDetail(false)}>
              {selSc && <DetailPanel sc={selSc} onClose={() => setShowDetail(false)} />}
            </SlideUp>
          </div>
        );
      }

      // ───── PC ─────
      return (
        <div style={{ height: "100vh", display: "flex", flexDirection: "column", backgroundColor: "#fafafa", color: "#111", overflow: "hidden" }}>
          {/* 과정 타이틀 바 */}
          <div style={{ height: 44, backgroundColor: "#1f2937", display: "flex", alignItems: "center", padding: "0 20px", gap: 8, flexShrink: 0 }}>
            <span style={{ color: "#fff", fontSize: 13, fontWeight: 600 }}>Executive MBA</span>
            <div style={{ flex: 1 }} />
            <button
              onClick={() => setShowRightPanel(!showRightPanel)}
              title={showRightPanel ? "학습목록 숨기기 (전체보기)" : "학습목록 보기"}
              style={{
                background: "none",
                border: "none",
                cursor: "pointer",
                padding: 6,
                color: showRightPanel ? "#9ca3af" : "#fff",
                display: "flex",
                alignItems: "center",
                borderRadius: 4,
              }}
            >
              {showRightPanel ? (
                /* 우측 패널 보임 상태: 숨기기 아이콘 (사이드 접기) */
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <line x1="15" y1="3" x2="15" y2="21"/>
                  <polyline points="10,8 6,12 10,16"/>
                </svg>
              ) : (
                /* 우측 패널 숨김 상태: 펼치기 아이콘 */
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <line x1="15" y1="3" x2="15" y2="21"/>
                  <polyline points="6,8 10,12 6,16"/>
                </svg>
              )}
            </button>
          </div>
          {/* 본문 3단 */}
          <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
            <div style={{ width: "clamp(240px, 23%, 364px)", flexShrink: 0, backgroundColor: "#fff", borderRight: "1px solid #e5e7eb", overflowY: "auto" }}>
              <InfoPanel showClose={false} />
            </div>
            {centerContent}
            {showRightPanel ? (
              <div style={{ width: "clamp(280px, 26%, 416px)", flexShrink: 0, borderLeft: "1px solid #e5e7eb", backgroundColor: "#fff", position: "relative", overflow: "hidden", display: "flex", flexDirection: "column" }}>
                <ListPanel showClose={false} />
                {selSc && <DetailPanel sc={selSc} onClose={() => setSelSc(null)} />}
              </div>
            ) : (
              selSc && (
                <div style={{ width: "clamp(280px, 26%, 416px)", flexShrink: 0, borderLeft: "1px solid #e5e7eb", backgroundColor: "#fff", position: "relative", overflow: "hidden", display: "flex", flexDirection: "column" }}>
                  <DetailPanel sc={selSc} onClose={() => setSelSc(null)} />
                </div>
              )
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
